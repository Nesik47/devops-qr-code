services:
  api:
    image: ${ECR_API_URL}:latest
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}

  frontend:
    depends_on:
      - api
    image: ${ECR_FRONTEND_URL}:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL} 